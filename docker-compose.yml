services:
  db:
    image: postgres:16-alpine
    container_name: mainstage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mainstage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mainstage"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
      target: development
    container_name: mainstage-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mainstage?schema=public
      JWT_SECRET: mainstage-dev-secret-change-in-production
      PORT: 3001
      SEED_ON_START: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: mainstage-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
